# nginx-deployment.yml — Deployment nginx pour les tests de base
# Déploie 3 réplicas nginx dans le namespace dev
# Inclut les annotations Prometheus pour le scraping des métriques

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: dev          # namespace de test (créé par script_test_namespaces.sh)
spec:
  replicas: 3             # nombre de Pod maintenus par le ReplicaSet géré par ce Deployment
  selector:
    matchLabels:
      app: nginx          # sélecteur : tous les Pods avec ce label sont gérés par ce Deployment
  template:
    metadata:
      labels:
        app: nginx        # label appliqué à chaque Pod créé
      annotations:
        # activation du scraping Prometheus automatique sur ce Pod
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"    # port sur lequel nginx expose /metrics
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: nginx
        image: nginx:latest      # ⚠ utiliser une version fixe en production (ex: nginx:1.25)
        ports:
        - containerPort: 80
