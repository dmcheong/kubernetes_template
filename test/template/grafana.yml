# Identifiants admin
adminUser: admin
adminPassword: admin   # À changer en production !

# Accès externe via NodePort
service:
  type: NodePort
  nodePort: 30030

# Datasource Prometheus pré-configurée
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.observability.svc.cluster.local:80
        isDefault: true

