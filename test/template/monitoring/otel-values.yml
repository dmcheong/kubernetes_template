# otel-values.yml
# Helm values pour OpenTelemetry Collector.
# Objectif :
# - recevoir OTLP HTTP/gRPC depuis Traefik, Kong et plus tard tes apps
# - exposer ses propres métriques pour Prometheus
# - rester simple en mode deployment pour Minikube lab

mode: deployment

replicaCount: 1

image:
  repository: otel/opentelemetry-collector-k8s

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "512Mi"

# -----------------------------------------------------------------------------
# Presets désactivés pour garder une config lisible et maîtrisée.
# -----------------------------------------------------------------------------
presets:
  logsCollection:
    enabled: false
  hostMetrics:
    enabled: false
  kubeletMetrics:
    enabled: false
  kubernetesAttributes:
    enabled: false

# -----------------------------------------------------------------------------
# Configuration Collector
# -----------------------------------------------------------------------------
config:
  receivers:
    # Réception OTLP depuis Traefik, Kong et futures apps instrumentées
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    # Scrape interne des métriques du collector lui-même
    prometheus:
      config:
        scrape_configs:
          - job_name: otel-collector
            scrape_interval: 15s
            static_configs:
              - targets:
                  - 0.0.0.0:8888

  processors:
    memory_limiter:
      check_interval: 1s
      limit_mib: 256
    batch: {}

  exporters:
    # Export logs console pour faciliter le debug du lab
    debug:
      verbosity: normal

    # Exemple prêt pour brancher Tempo ou un autre backend OTLP plus tard
    # Décommente quand tu auras un backend de traces OTLP.
    # otlphttp/tempo:
    #   endpoint: http://tempo.monitoring.svc.cluster.local:4318

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [debug]

      metrics:
        receivers: [otlp, prometheus]
        processors: [memory_limiter, batch]
        exporters: [debug]

# -----------------------------------------------------------------------------
# Service Kubernetes
# -----------------------------------------------------------------------------
service:
  enabled: true
  type: ClusterIP

  ports:
    otlp-grpc:
      enabled: true
      port: 4317
      targetPort: 4317
      protocol: TCP

    otlp-http:
      enabled: true
      port: 4318
      targetPort: 4318
      protocol: TCP

    metrics:
      enabled: true
      port: 8888
      targetPort: 8888
      protocol: TCP

# -----------------------------------------------------------------------------
# ServiceMonitor pour Prometheus Operator
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  extraLabels:
    release: kube-prometheus-stack
  metricsEndpoints:
    - port: metrics
      interval: 15s