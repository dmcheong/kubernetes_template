# OpenTelemetry Collector - Configuration pour le lab
# Reçoit OTLP des services OTel Demo et expose les métriques pour Prometheus

mode: deployment

fullnameOverride: otel-collector

image:
  repository: otel/opentelemetry-collector-contrib

replicaCount: 1

# Configuration du collector
config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 10s
      send_batch_size: 1024
    memory_limiter:
      check_interval: 1s
      limit_mib: 512
      spike_limit_mib: 128

  exporters:
    # Exporter les métriques au format Prometheus
    prometheus:
      endpoint: 0.0.0.0:8889
      namespace: otel
      resource_to_telemetry_conversion:
        enabled: true

    # Debug pour voir ce qui passe
    debug:
      verbosity: basic

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  service:
    extensions: [health_check]
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheus, debug]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [debug]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [debug]

# Ports à exposer
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

# Service
service:
  enabled: true
  type: ClusterIP

# Annotations pour que Prometheus scrape le collector
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8889"
  prometheus.io/path: "/metrics"

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi