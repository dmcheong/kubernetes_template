# nginx-nodeport-service.yml — Service NodePort pour nginx
# Expose nginx sur le port 30007 de chaque nœud du cluster
# Accessible depuis l'extérieur via http://<IP_NODE>:30007

apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport-service
spec:
  type: NodePort       # ouvre un port sur tous les nœuds du cluster
  selector:
    app: nginx         # cible les Pods avec label app: nginx
  ports:
    - protocol: TCP
      port: 80         # port du Service (interne au cluster)
      targetPort: 80   # port du container nginx
      nodePort: 30007  # port ouvert sur le nœud (plage valide : 30000-32767)
