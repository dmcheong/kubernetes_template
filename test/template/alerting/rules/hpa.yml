# hpa.yml — HorizontalPodAutoscaler basé sur métriques custom Prometheus
# Nécessite Prometheus Adapter installé et configuré (adapter-values.yml)
# Scale le Deployment demo-api entre 2 et 10 réplicas selon le trafic

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-api-hpa
  namespace: default    # doit correspondre au namespace du Deployment cible
spec:
  # Deployment à scaler automatiquement
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-api             # ⚙ adapter au nom réel du Deployment
  minReplicas: 2               # nombre minimal de réplicas (haute disponibilité)
  maxReplicas: 10              # plafond de réplicas (limite les coûts infra)
  metrics:
    - type: Pods
      pods:
        metric:
          # métrique exposée par Prometheus Adapter (définie dans adapter-values.yml)
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "20"   # au-delà de 20 req/s par pod → scale out
