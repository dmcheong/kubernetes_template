alertmanager:
  enabled: true
  persistentVolume:
    enabled: true
    size: 2Gi

  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: 'default'
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'https://webhook.site/VOTRE-UUID'
            send_resolved: true