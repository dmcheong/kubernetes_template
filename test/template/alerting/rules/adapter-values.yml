# adapter-values.yml — Helm values pour Prometheus Adapter
# Identique à prometheus-values.yml — utilisé directement par le script
# d'installation de l'autoscaling (script_test_prometheus_hscaling.sh)

# URL du serveur Prometheus (interne au cluster)
prometheus:
  url: http://prometheus-operated.monitoring.svc
  port: 9090

rules:
  default: false    # désactiver les règles par défaut
  custom:
    # Règle de conversion : http_requests_total → http_requests_per_second
    # Permet au HPA de scaler sur le nombre de requêtes HTTP par seconde
    - seriesQuery: 'http_requests_total{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace    # lie le label namespace à la ressource Kubernetes Namespace
          pod:
            resource: pod          # lie le label pod à la ressource Kubernetes Pod
      name:
        matches: "^(.*)_total$"
        as: "${1}_per_second"      # renommage pour le HPA
      metricsQuery: 'sum(rate(http_requests_total{<<.LabelMatchers>>}[2m])) by (<<.GroupBy>>)'
