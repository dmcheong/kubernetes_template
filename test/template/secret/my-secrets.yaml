# my-secrets.yaml — Secret Kubernetes de démonstration
# ⚠ SÉCURITÉ : ne jamais committer ce fichier avec de vraies valeurs
#   → ajouter my-secrets.yaml à .gitignore
#   → utiliser SealedSecrets (monsealedsecret.yaml) pour les dépôts git
#   → ou HashiCorp Vault pour la gestion avancée en production

apiVersion: v1
kind: Secret
metadata:
  name: monsecret
  namespace: dev
type: Opaque     # type générique pour les secrets arbitraires
data:
  # Les valeurs DOIVENT être encodées en base64 :
  # echo -n "admin"         | base64  →  YWRtaW4=
  # echo -n "SuperSecret123" | base64 →  U3VwZXJTZWNyZXQxMjM=
  username: YWRtaW4=           # admin en base64
  password: U3VwZXJTZWNyZXQxMjM=  # SuperSecret123 en base64
