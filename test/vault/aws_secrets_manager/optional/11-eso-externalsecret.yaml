apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-config
  namespace: demo-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: app-config-k8s
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: demo/app-config
        property: username
    - secretKey: password
      remoteRef:
        key: demo/app-config
        property: password
    - secretKey: url
      remoteRef:
        key: demo/app-config
        property: url
