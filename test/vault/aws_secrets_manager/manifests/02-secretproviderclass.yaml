apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aws-secretsmanager-app-config
  namespace: demo-secrets
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "demo/app-config"
        objectType: "secretsmanager"
        jmesPath:
          - path: "username"
            objectAlias: "username"
          - path: "password"
            objectAlias: "password"
          - path: "url"
            objectAlias: "url"
