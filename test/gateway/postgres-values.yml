# postgres-values.yml — Helm values pour PostgreSQL (bitnami/postgresql)
# Instance PostgreSQL dédiée à Kong Gateway
# Les credentials sont injectés depuis un Secret Kubernetes existant

auth:
  username: kong                                     # utilisateur de la base Kong
  database: kong                                     # base de données à créer
  existingSecret: kong-ingress-controller-postgresql # Secret contenant le mot de passe
  secretKeys:
    userPasswordKey: postgresql-password             # clé dans le Secret

# service PostgreSQL exposé sur le port standard 5432
primary:
  service:
    port: 5432
