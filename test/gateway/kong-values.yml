# kong-values.yml — Helm values pour Kong Gateway
# Se connecte au PostgreSQL installé séparément (bitnami/postgresql)
# IMPORTANT : postgresql.enabled est désactivé car on gère PostgreSQL
#             via un chart Helm indépendant (kong-postgresql)

env:
  # connexion à PostgreSQL
  pg_user: kong                         # utilisateur créé dans postgres-values.yml
  pg_database: kong                     # base de données Kong
  pg_host: kong-postgresql-postgresql   # nom DNS du Service PostgreSQL dans le cluster
  pg_password:
    # injection sécurisée du mot de passe depuis le Secret Kubernetes
    # (créé via kong-gateway-secret.yaml ou kong-gateway-sealed-secret.yaml)
    valueFrom:
      secretKeyRef:
        name: kong-ingress-controller-postgresql
        key: postgresql-password

# désactivation du chart PostgreSQL intégré à Kong
# on utilise la release kong-postgresql installée séparément
postgresql:
  enabled: false
