# whoami.yml — Application de test pour valider le routage Traefik
# Déploie le service whoami (traefik/whoami) dans le namespace dev
# whoami renvoie des informations sur la requête HTTP reçue (headers, IP, …)

---
# namespace dev — création idempotente
apiVersion: v1
kind: Namespace
metadata:
  name: dev

---
# Deployment whoami : 1 réplica, annotations Prometheus pour le scraping
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
      annotations:
        # activation du scraping Prometheus sur le port 80, chemin /metrics
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: whoami
          image: traefik/whoami    # image de test officielle Traefik
          ports:
            - containerPort: 80

---
# Service ClusterIP pour exposer whoami en interne au cluster
# Sélectionne les pods avec le label app: whoami
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: dev
spec:
  selector:
    app: whoami
  ports:
    - port: 80
      targetPort: 80
