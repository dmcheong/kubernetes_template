# whoami.yml
# Application de test simple pour valider le routage Traefik.
# L'image traefik/whoami renvoie des informations sur la requête HTTP reçue.
# Ce workload sert surtout à tester le chemin réseau, pas la supervision métier.

---
# Namespace de lab / test.
apiVersion: v1
kind: Namespace
metadata:
  name: dev

---
# Déploiement whoami.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

---
# Service ClusterIP exposant whoami à l'intérieur du cluster.
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: dev
spec:
  selector:
    app: whoami
  ports:
    - name: http
      port: 80
      targetPort: 80