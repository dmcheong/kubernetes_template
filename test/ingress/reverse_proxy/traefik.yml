# nombre de réplicas du pod Traefik
deployment:
  replicas: 1

# IngressClass : permet d'avoir plusieurs controllers d'ingress dans le même cluster
# isDefaultClass: false → Traefik ne capture pas les Ingress sans annotation explicite
ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik

# Activation des providers Kubernetes
providers:
  # CRD Traefik : IngressRoute, Middleware, etc.
  kubernetesCRD:
    enabled: true
  # support des ressources Ingress Kubernetes standard
  kubernetesIngress:
    enabled: true

# Ports exposés par Traefik
ports:
  web:
    port: 8000           # port interne du container
    exposedPort: 80      # port exposé par le Service
    expose:
      default: true

  websecure:
    port: 8443
    exposedPort: 443
    expose:
      default: true

  traefik:
    port: 9000           # dashboard Traefik
    expose:
      default: false     # non exposé externalement

  metrics:
    port: 9100           # endpoint /metrics pour Prometheus
    expose:
      default: false     # non exposé externalement

# Type de Service : LoadBalancer expose Traefik via une IP externe
# sur Minikube, cela se comporte généralement comme un NodePort
service:
  type: LoadBalancer

# API et dashboard Traefik
# insecure: false → dashboard non exposé publiquement
api:
  dashboard: true
  insecure: false

# Niveau de log général de Traefik
logs:
  general:
    level: INFO

# Configuration des métriques exportées par Traefik
metrics:
  prometheus:
    addEntryPointsLabels: true   # ajoute des labels par entrypoint (web, websecure)
    addRoutersLabels: true       # ajoute des labels par routeur
    addServicesLabels: true      # ajoute des labels par service backend
    entryPoint: metrics          # utilise l'entrypoint metrics (port 9100)

    service:
      enabled: true              # crée un Service Kubernetes pour exposer les métriques en interne

    serviceMonitor:
      enabled: true              # permet à Prometheus Operator de découvrir automatiquement Traefik
      namespace: monitoring      # namespace dans lequel Prometheus cherche le ServiceMonitor

  # export des métriques vers un collecteur OpenTelemetry via OTLP HTTP
  otlp:
    enabled: true
    serviceName: traefik
    http:
      enabled: true
      endpoint: "http://opentelemetry-collector.monitoring.svc.cluster.local:4318/v1/metrics"

# Traces distribuées envoyées vers OpenTelemetry Collector
tracing:
  otlp:
    enabled: true
    http:
      enabled: true
      endpoint: "http://opentelemetry-collector.monitoring.svc.cluster.local:4318/v1/traces"

# Arguments supplémentaires passés au binaire Traefik
additionalArguments:
  - "--ping=true"        # active l'endpoint /ping pour les health checks