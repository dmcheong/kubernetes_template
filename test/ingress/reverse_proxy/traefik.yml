# traefik.yml
# Helm values pour Traefik sur Minikube.
# Objectif :
# - Traefik est le point d'entrée principal du lab
# - support des Ingress standard + CRD Traefik
# - métriques Prometheus
# - traces OTLP vers OpenTelemetry Collector
# - dashboard disponible en interne, pas exposé publiquement

# -----------------------------------------------------------------------------
# Déploiement Traefik
# -----------------------------------------------------------------------------
deployment:
  replicas: 1  # 1 réplica suffit en lab Minikube

# -----------------------------------------------------------------------------
# IngressClass
# Traefik ne devient pas le controller par défaut.
# Cela évite qu'il capture tous les Ingress du cluster sans annotation explicite.
# -----------------------------------------------------------------------------
ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik

# -----------------------------------------------------------------------------
# Providers Kubernetes
# - kubernetesCRD : permet d'utiliser IngressRoute, Middleware, etc.
# - kubernetesIngress : permet d'utiliser les ressources Ingress standard
# -----------------------------------------------------------------------------
providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true

# -----------------------------------------------------------------------------
# Ports exposés par Traefik
# -----------------------------------------------------------------------------
ports:
  web:
    port: 8000
    exposedPort: 80
    expose:
      default: true

  websecure:
    port: 8443
    exposedPort: 443
    expose:
      default: true

  traefik:
    port: 9000
    expose:
      default: false  # dashboard non exposé à l'extérieur

  metrics:
    port: 9100
    expose:
      default: false  # métriques seulement en interne

# -----------------------------------------------------------------------------
# Type de service
# En Minikube :
# - LoadBalancer fonctionne avec `minikube tunnel`
# - sinon NodePort est aussi une option de lab
# -----------------------------------------------------------------------------
service:
  type: NodePort

# -----------------------------------------------------------------------------
# API / Dashboard Traefik
# -----------------------------------------------------------------------------
api:
  dashboard: true
  insecure: false  # évite une exposition publique non protégée

# -----------------------------------------------------------------------------
# Logs Traefik
# -----------------------------------------------------------------------------
logs:
  general:
    level: INFO

# -----------------------------------------------------------------------------
# Observabilité : métriques Prometheus
# Prometheus Operator découvre les ServiceMonitor.
# -----------------------------------------------------------------------------
metrics:
  prometheus:
    enabled: true
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    entryPoint: metrics

    service:
      enabled: true

    serviceMonitor:
      enabled: true
      namespace: monitoring
      additionalLabels:
        release: kube-prometheus-stack

  # ---------------------------------------------------------------------------
  # Export OTLP des métriques Traefik vers l'OpenTelemetry Collector
  # Tu peux garder cette partie pour montrer l'intégration OTel.
  # ---------------------------------------------------------------------------
  otlp:
    enabled: true
    serviceName: traefik
    http:
      enabled: true
      endpoint: "http://opentelemetry-collector.monitoring.svc.cluster.local:4318/v1/metrics"

# -----------------------------------------------------------------------------
# Traces distribuées envoyées vers OpenTelemetry Collector
# -----------------------------------------------------------------------------
tracing:
  otlp:
    enabled: true
    http:
      enabled: true
      endpoint: "http://opentelemetry-collector.monitoring.svc.cluster.local:4318/v1/traces"

# -----------------------------------------------------------------------------
# Arguments supplémentaires
# -----------------------------------------------------------------------------
additionalArguments:
  - "--ping=true"  # active /ping pour les probes / health checks

# -----------------------------------------------------------------------------
# Ressources modestes pour Minikube
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"