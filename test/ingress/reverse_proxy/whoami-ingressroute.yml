# whoami-ingressroute.yml
# IngressRoute Traefik pour exposer whoami via le host whoami.local.
# En lab Minikube, ajoute une entrée /etc/hosts vers l'IP de minikube
# ou vers l'IP exposée via minikube tunnel.

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami
  namespace: dev
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`whoami.local`)
      kind: Rule
      services:
        - name: whoami
          port: 80