# kubernetes-dashboard-networkpolicy.yml
# Politique réseau minimale pour le namespace kubernetes-dashboard.
# À utiliser seulement si ton CNI applique les NetworkPolicy.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-dashboard
  namespace: kubernetes-dashboard
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8443
        - protocol: TCP
          port: 443